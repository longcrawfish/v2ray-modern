name: v2ray-modern

services:
  core:
    image: alpine:3.20
    container_name: v2ray-modern-core
    restart: unless-stopped
    env_file:
      - .env
    command:
      - /bin/sh
      - -lc
      - |
        echo "v2ray-modern refactor-base bootstrap container"
        echo "PROFILE=${PROFILE:-unset}"
        echo "DOMAIN=${DOMAIN:-unset}"
        trap 'exit 0' TERM INT
        while true; do sleep 3600; done
    volumes:
      - ./data/runtime:/app/runtime
      - ./data/exports:/app/exports
      - ./data/logs:/app/logs
    ports:
      - "${XRAY_PORT:-443}:443"
