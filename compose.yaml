name: v2ray-modern

services:
  xray:
    image: ${XRAY_IMAGE}
    container_name: v2ray-modern-xray
    restart: unless-stopped
    env_file:
      - .env
    command:
      - xray
      - run
      - -c
      - /etc/xray/config.json
    volumes:
      - ./data/runtime/transport-xray.json:/etc/xray/config.json:ro
      - ./data/logs/xray:/var/log/xray
    ports:
      - "${XRAY_PORT:-443}:${XRAY_PORT:-443}"
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /etc/xray/config.json
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      io.v2ray-modern.branch: v2-reality
      io.v2ray-modern.service: xray
      io.v2ray-modern.profile: ${PROFILE}

  subscription-caddy:
    image: ${SUBSCRIPTION_CADDY_IMAGE:-caddy:2.8-alpine}
    container_name: v2ray-modern-subscription-caddy
    restart: unless-stopped
    env_file:
      - .env
    command:
      - caddy
      - run
      - --config
      - /etc/caddy/Caddyfile
      - --adapter
      - caddyfile
    volumes:
      - ./data/runtime/proxy-Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/exports:/srv:ro
      - ./data/logs/caddy:/var/log/caddy
    ports:
      - "${SUBSCRIPTION_CADDY_PORT:-18080}:${SUBSCRIPTION_CADDY_PORT:-18080}"
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /etc/caddy/Caddyfile
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      io.v2ray-modern.branch: v2-reality
      io.v2ray-modern.service: subscription-caddy
      io.v2ray-modern.profile: ${PROFILE}
