name: v2ray-modern

services:
  xray:
    image: ${XRAY_IMAGE}
    container_name: v2ray-modern-xray
    restart: unless-stopped
    env_file:
      - .env
    command:
      - xray
      - run
      - -c
      - /etc/xray/config.json
    volumes:
      - ./data/runtime/transport-xray.json:/etc/xray/config.json:ro
      - ./data/logs/xray:/var/log/xray
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /etc/xray/config.json
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      io.v2ray-modern.branch: v2-ws-tls
      io.v2ray-modern.service: xray
      io.v2ray-modern.profile: ${PROFILE}

  caddy:
    image: ${CADDY_IMAGE}
    container_name: v2ray-modern-caddy
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - xray
    volumes:
      - ./data/runtime/proxy-Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/runtime/proxy-index.html:/srv/index.html:ro
      - ./data/exports:/exports:ro
      - ./data/logs/caddy:/var/log/caddy
      - ./data/logs/caddy/data:/data
      - ./data/logs/caddy/config:/config
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /etc/caddy/Caddyfile
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      io.v2ray-modern.branch: v2-ws-tls
      io.v2ray-modern.service: caddy
      io.v2ray-modern.profile: ${PROFILE}
